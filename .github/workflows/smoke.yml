name: Cask smoke test

on:
  push:
    paths:
      - "Casks/**"
      - ".github/workflows/smoke.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Environment
        run: |
          brew --version
          sw_vers

      - name: Tap (audit/install need the cask by name, not by path)
        run: brew tap iillyyaa1997/tap

      - name: Audit cask
        run: brew audit --cask iillyyaa1997/tap/u-zora

      - name: Style (advisory)
        run: brew style iillyyaa1997/tap/u-zora || echo "::warning::brew style reported issues"

      - name: Verify release DMG downloads + checksum matches cask
        run: |
          set -euxo pipefail
          VERSION="$(awk -F'"' '/^  version /{print $2}' Casks/u-zora.rb)"
          WANT="$(awk -F'"' '/^  sha256 /{print $2}' Casks/u-zora.rb)"
          URL="https://github.com/iillyyaa1997/u-zora/releases/download/v${VERSION}/uZora-v${VERSION}.dmg"
          curl -fsSL "$URL" -o /tmp/uz.dmg
          GOT="$(shasum -a 256 /tmp/uz.dmg | awk '{print $1}')"
          echo "version=$VERSION want=$WANT got=$GOT"
          [ "$WANT" = "$GOT" ]

      - name: Live install (auto-enables on macOS >= 26, the cask minimum)
        run: |
          set -euxo pipefail
          MAJOR="$(sw_vers -productVersion | cut -d. -f1)"
          if [ "$MAJOR" -ge 26 ]; then
            brew install --cask --no-quarantine iillyyaa1997/tap/u-zora
            test -d "/Applications/uZora.app"
            brew uninstall --cask iillyyaa1997/tap/u-zora
            echo "Live install OK on macOS $(sw_vers -productVersion)."
          else
            echo "Runner is macOS $(sw_vers -productVersion); cask requires >= 26 (Tahoe)."
            echo "Live install skipped — audit + checksum already validated the cask."
          fi
